<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dropbox Folder Link</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #f7f7f7; color: #333;
    display: flex; justify-content: center; align-items: center;
    min-height: 100vh; padding: 20px;
  }
  .card {
    background: #fff; border-radius: 12px; padding: 40px;
    max-width: 520px; width: 100%;
    box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    text-align: center;
  }
  .icon { font-size: 48px; margin-bottom: 16px; }
  h1 { font-size: 20px; margin-bottom: 8px; }
  .path {
    background: #f0f4f8; border-radius: 8px; padding: 12px 16px;
    font-family: "Consolas", "SF Mono", monospace; font-size: 13px;
    word-break: break-all; margin: 16px 0; text-align: left;
    color: #1a73e8;
  }
  .status { color: #666; font-size: 14px; margin-bottom: 20px; }
  .btn {
    display: inline-block; background: #0061fe; color: #fff;
    border: none; border-radius: 8px; padding: 12px 28px;
    font-size: 15px; cursor: pointer; text-decoration: none;
    transition: background 0.2s;
  }
  .btn:hover { background: #004dd1; }
  .btn-secondary {
    background: transparent; color: #0061fe; border: 1px solid #0061fe;
    margin-left: 8px;
  }
  .btn-secondary:hover { background: #f0f4f8; }
  .buttons { margin-top: 20px; }
  .help { margin-top: 24px; font-size: 12px; color: #999; }
  .error { color: #d32f2f; }
</style>
</head>
<body>
<div class="card">
  <div class="icon">📂</div>
  <h1 id="title">Opening folder...</h1>
  <div class="path" id="pathDisplay"></div>
  <div class="status" id="status">Redirecting to Explorer...</div>
  <div class="buttons" id="buttons" style="display:none">
    <a class="btn" id="openBtn" href="#">Open in Explorer</a>
    <button class="btn btn-secondary" id="copyBtn" onclick="copyPath()">Copy path</button>
  </div>
  <div class="help" id="help"></div>
</div>

<script>
(function() {
  var hash = window.location.hash.slice(1);
  if (!hash) {
    document.getElementById('title').textContent = 'No path specified';
    document.getElementById('title').className = 'error';
    document.getElementById('pathDisplay').style.display = 'none';
    document.getElementById('status').textContent = 'Use the right-click menu to generate a link.';
    return;
  }

  var relativePath = decodeURIComponent(hash);
  var winPath = 'C:\\KiQ Dropbox\\' + relativePath.replace(/\//g, '\\');
  var dropboxUri = 'dropbox://' + hash;

  document.getElementById('pathDisplay').textContent = winPath;
  document.getElementById('title').textContent = 'Dropbox Folder Link';

  window.location.href = dropboxUri;

  setTimeout(function() {
    document.getElementById('status').textContent =
      'If the folder did not open automatically:';
    document.getElementById('buttons').style.display = 'block';
    document.getElementById('openBtn').href = dropboxUri;
    document.getElementById('help').textContent =
      'Or copy the path above and paste into Explorer address bar or Win+R.';
  }, 1500);

  window._winPath = winPath;
})();

function copyPath() {
  navigator.clipboard.writeText(window._winPath).then(function() {
    document.getElementById('copyBtn').textContent = 'Copied!';
    setTimeout(function() {
      document.getElementById('copyBtn').textContent = 'Copy path';
    }, 2000);
  });
}
</script>
</body>
</html>
